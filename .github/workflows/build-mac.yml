name: Build macOS Client

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - x64
          - arm64
  push:
    branches: [main]
    paths:
      - '剪影客户端/jianying-client-mac/**'

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: 剪影客户端/jianying-client-mac
        run: npm install

      - name: Build macOS (both architectures)
        if: github.event.inputs.arch == 'both' || github.event.inputs.arch == ''
        working-directory: 剪影客户端/jianying-client-mac
        run: npx electron-builder --mac --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS (x64 only)
        if: github.event.inputs.arch == 'x64'
        working-directory: 剪影客户端/jianying-client-mac
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS (arm64 only)
        if: github.event.inputs.arch == 'arm64'
        working-directory: 剪影客户端/jianying-client-mac
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        working-directory: 剪影客户端/jianying-client-mac
        run: ls -lh dist/

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: 剪影客户端/jianying-client-mac/dist/*.dmg
          retention-days: 30

      - name: Upload ZIP artifacts (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: mac-zip
          path: 剪影客户端/jianying-client-mac/dist/*.zip
          retention-days: 30
          if-no-files-found: ignore
