name: Build macOS Client

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - x64
          - arm64
  push:
    branches: [main]
    paths:
      - '剪影客户端/jianying-client-mac/**'
      - '.github/workflows/build-mac.yml'

env:
  MAC_DIR: '剪影客户端/jianying-client-mac'
  ELECTRON_CACHE: ~/.cache/electron
  ELECTRON_BUILDER_CACHE: ~/.cache/electron-builder

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-mac-${{ hashFiles('剪影客户端/jianying-client-mac/package.json') }}
          restore-keys: |
            electron-mac-

      - name: Install dependencies (with retry)
        run: |
          cd "$MAC_DIR"
          for i in 1 2 3; do
            npm install && break
            echo "npm install attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Determine build arch
        id: arch
        run: |
          INPUT_ARCH="${{ github.event.inputs.arch }}"
          if [ -z "$INPUT_ARCH" ] || [ "$INPUT_ARCH" = "both" ]; then
            echo "flags=--x64 --arm64" >> $GITHUB_OUTPUT
          elif [ "$INPUT_ARCH" = "x64" ]; then
            echo "flags=--x64" >> $GITHUB_OUTPUT
          elif [ "$INPUT_ARCH" = "arm64" ]; then
            echo "flags=--arm64" >> $GITHUB_OUTPUT
          fi

      - name: Build macOS
        run: |
          cd "$MAC_DIR"
          npx electron-builder --mac ${{ steps.arch.outputs.flags }} --publish never

      - name: List build output
        if: always()
        run: ls -lhR "$MAC_DIR/dist/" || echo "No dist directory"

      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-zip
          path: |
            剪影客户端/jianying-client-mac/dist/*.zip
          retention-days: 30
          if-no-files-found: warn
