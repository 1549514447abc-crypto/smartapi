<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪映草稿导入工具--创作魔方免费版客户端</title>
    <!-- 样式文件 -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 应用头部 -->
        <div class="app-header">
            <div class="app-title">
                <span>🎬</span>
                <h1>剪映草稿导入工具--创作魔方免费版客户端</h1>
            </div>
            <div class="user-info">
                <div class="user-avatar">U</div>
                <span>用户</span>
            </div>
        </div>

        <!-- 导航菜单 -->
        <nav class="nav-menu">
            <ul class="nav-tabs">
                <li class="nav-tab">
                    <button class="nav-btn active" data-page="import">草稿导入</button>
                </li>
                <li class="nav-tab">
                    <button class="nav-btn" data-page="history">草稿历史记录</button>
                </li>
                <li class="nav-tab">
                    <button class="nav-btn" data-page="profile">个人中心</button>
                </li>
            </ul>
        </nav>

        <!-- 页面内容容器 -->
        <div class="page-container">
            <!-- 草稿导入页面 -->
            <div id="import-page" class="page active">
                <!-- 内容由 import-module.js 生成 -->
            </div>

            <!-- 草稿历史记录页面 -->
            <div id="history-page" class="page">
                <!-- 内容由 history-module.js 生成 -->
            </div>

            <!-- 个人中心页面 -->
            <div id="profile-page" class="page">
                <!-- 内容由 profile-module.js 生成 -->
            </div>
        </div>
    </div>

    <!-- 状态日志容器 -->
    <div id="globalStatusLog" style="display: none;"></div>

    <!-- 模块文件加载 -->
    <script>
        // 全局应用对象
        window.JianyingApp = {
            // 全局状态
            state: {
                currentPage: 'import',
                isImporting: false,
                jianyingPath: '',
                totalFiles: 0,
                downloadedFiles: 0,
                userStats: {}
            },

            // 模块注册表
            modules: {},

            // 事件系统
            events: {
                listeners: {},
                
                on(event, callback) {
                    if (!this.listeners[event]) {
                        this.listeners[event] = [];
                    }
                    this.listeners[event].push(callback);
                },
                
                emit(event, data) {
                    if (this.listeners[event]) {
                        this.listeners[event].forEach(callback => callback(data));
                    }
                }
            },

            // 工具函数
            utils: {
                // 日志记录函数
                addLog(message, type = 'info') {
                    const logEvent = new CustomEvent('app:log', {
                        detail: { message, type, timestamp: new Date() }
                    });
                    document.dispatchEvent(logEvent);
                    console.log(`[${type.toUpperCase()}] ${message}`);
                },

                // 显示通知
                showNotification(message, type = 'info') {
                    // 这里可以实现通知系统
                    console.log(`[NOTIFICATION] ${message}`);
                },

                // 更新全局状态
                updateState(key, value) {
                    const oldValue = this.getState(key);
                    this.setState(key, value);
                    
                    // 发出状态变化事件
                    window.JianyingApp.events.emit('stateChanged', {
                        key, oldValue, newValue: value
                    });
                },

                setState(key, value) {
                    const keys = key.split('.');
                    let obj = window.JianyingApp.state;
                    
                    for (let i = 0; i < keys.length - 1; i++) {
                        if (!(keys[i] in obj)) {
                            obj[keys[i]] = {};
                        }
                        obj = obj[keys[i]];
                    }
                    
                    obj[keys[keys.length - 1]] = value;
                },

                getState(key) {
                    const keys = key.split('.');
                    let obj = window.JianyingApp.state;
                    
                    for (const k of keys) {
                        if (obj && typeof obj === 'object' && k in obj) {
                            obj = obj[k];
                        } else {
                            return undefined;
                        }
                    }
                    
                    return obj;
                }
            },

            // 页面导航
            navigation: {
                switchPage(pageName) {
                    // 隐藏所有页面
                    document.querySelectorAll('.page').forEach(page => {
                        page.classList.remove('active');
                    });
                    
                    // 显示目标页面
                    const targetPage = document.getElementById(pageName + '-page');
                    if (targetPage) {
                        targetPage.classList.add('active');
                    }
                    
                    // 更新导航按钮
                    document.querySelectorAll('.nav-btn').forEach(btn => {
                        btn.classList.remove('active');
                        if (btn.dataset.page === pageName) {
                            btn.classList.add('active');
                        }
                    });
                    
                    // 更新状态
                    window.JianyingApp.utils.updateState('currentPage', pageName);
                    
                    // 发出页面切换事件
                    window.JianyingApp.events.emit('pageChanged', pageName);
                }
            }
        };

        // 初始化导航事件
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定导航按钮点击事件
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetPage = btn.dataset.page;
                    window.JianyingApp.navigation.switchPage(targetPage);
                });
            });

            // 应用初始化完成
            window.JianyingApp.utils.addLog('应用初始化完成', 'success');
            
            // 发出应用就绪事件
            window.JianyingApp.events.emit('appReady');
        });
    </script>

    <!-- 配置文件 -->
    <script src="js/config.js"></script>
    
    <!-- 核心模块 -->
    <script src="js/path-manager.js"></script>
    <script src="js/download-core.js"></script>
    
    <!-- 功能模块 -->
    <script src="js/import-module.js"></script>
    <script src="js/history-module.js"></script>
    <script src="js/profile-module.js"></script>

    <!-- 主应用逻辑 -->
    <script src="js/main.js"></script>
</body>
</html>
