<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - SmartAPI 创作魔方</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-screen bg-white font-sans text-slate-900 antialiased overflow-hidden">

    <div class="flex w-full h-full">

        <div class="hidden lg:flex lg:w-1/2 bg-slate-900 relative flex-col justify-between p-16 overflow-hidden">

            <div class="z-20 flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-900/50">S</div>
                <span class="text-2xl font-bold text-white tracking-tight">SmartAPI</span>
            </div>

            <div class="z-20 relative max-w-lg">
                <h2 class="text-5xl font-bold text-white mb-8 leading-tight">
                    构建下一代 <br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">企业级 AI 智能体</span>
                </h2>
                <div class="space-y-6">
                    <div class="flex gap-4 p-4 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-sm">
                        <div class="text-3xl">🚀</div>
                        <div>
                            <h3 class="text-white font-semibold mb-1">效率提升 300%</h3>
                            <p class="text-slate-400 text-sm">"接入 SmartAPI 后，我们的视频文案提取和处理流程实现了全自动化。"</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="z-20 text-slate-500 text-sm">
                © 2025 SmartAPI Inc. All rights reserved.
            </div>

            <div class="absolute top-0 right-0 w-[800px] h-[800px] bg-blue-600/20 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/2 animate-pulse"></div>
            <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-indigo-600/10 rounded-full blur-[100px] translate-y-1/3 -translate-x-1/4"></div>

            <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-20 z-10"></div>
        </div>

        <div class="w-full lg:w-1/2 flex flex-col justify-center items-center p-8 bg-white relative">

            <div class="lg:hidden absolute top-8 left-8 flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center text-white font-bold">S</div>
                <span class="text-xl font-bold text-slate-900">SmartAPI</span>
            </div>

            <div class="w-full max-w-[400px]">
                <div class="mb-10 text-center lg:text-left">
                    <h1 class="text-3xl font-bold text-slate-900 mb-2">欢迎回来</h1>
                    <p class="text-slate-500">请输入您的账号信息以访问控制台</p>
                </div>

                <form class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">电子邮箱 / 手机号</label>
                        <div class="relative">
                            <input type="text" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all placeholder-slate-400 text-slate-700" placeholder="name@company.com">
                            <svg class="w-5 h-5 text-slate-400 absolute right-4 top-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" /></svg>
                        </div>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-semibold text-slate-700">密码</label>
                            <a href="#" class="text-sm font-medium text-blue-600 hover:text-blue-700">忘记密码?</a>
                        </div>
                        <div class="relative">
                            <input type="password" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all placeholder-slate-400 text-slate-700" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="button" class="w-full py-3.5 px-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-lg shadow-slate-900/20 transition-all hover:-translate-y-0.5 active:translate-y-0">
                        立即登录
                    </button>

                    <div class="text-center mt-6">
                        <p class="text-sm text-slate-500">
                            还没有账号?
                            <a href="#" class="font-bold text-blue-600 hover:text-blue-700 ml-1">免费注册</a>
                        </p>
                    </div>
                </form>

                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-100"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-4 bg-white text-slate-400 bg-white">或者通过以下方式登录</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors text-slate-600 font-medium">
                        <svg class="w-5 h-5 text-[#07C160]" fill="currentColor" viewBox="0 0 24 24"><path d="M8.694 13.908c-.732 0-1.393-.566-1.393-1.393 0-.825.66-1.392 1.393-1.392.73 0 1.392.567 1.392 1.392 0 .827-.662 1.393-1.392 1.393zm6.658 0c-.732 0-1.393-.566-1.393-1.393 0-.825.66-1.392 1.393-1.392.732 0 1.393.567 1.393 1.392 0 .827-.66 1.393-1.393 1.393zM12 2C6.477 2 2 6.136 2 11.238c0 2.872 1.417 5.438 3.647 7.116-.16.896-.583 2.502-.667 2.858-.11.458.384.625.668.455.517-.308 3.525-2.228 4.093-2.658.74.205 1.517.316 2.31.316 5.474 0 9.95-4.135 9.95-9.237C22.002 4.965 17.525 2 12 2z"/></svg>
                        微信登录
                    </button>
                    <button class="flex items-center justify-center gap-2 px-4 py-2.5 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors text-slate-600 font-medium">
                         <svg class="w-5 h-5 text-[#1677FF]" viewBox="0 0 1024 1024" fill="currentColor"><path d="M784.8 622c15.8-21 34.2-46.6 34.2-82.6 0-77.8-63.4-129-158.2-129-105.8 0-161.4 68.6-161.4 68.6-19.4 23.4-23.4 51.4-2.6 68.2 21 16.6 57.8 14.6 77-9.4 0 0 25-34.2 81-34.2 38.6 0 63.8 23 63.8 54.2 0 17-9.8 31-23.4 49-62.2 82.2-225 15.4-266.6-47-51.4-77-22.6-189 67.8-250.2 68.6-46.6 153.4-53.4 227-18.6 42.6 20.2 135 77.4 135 77.4 34.2 15.4 39.8 62.6 11 86.2-23.8 19.4-61.4 17.8-85-11 0 0-48.6-58.6-91.8-68.2-39.4-9-106.6 12.2-143.4 75-31 53-15.8 126.6 34.2 165.4 33 25.4 122.2 46.2 143.4-24.2zM484 766c0 23.8 19.2 43 43 43s43-19.2 43-43-19.2-43-43-43-43 19.2-43 43z"/></svg>
                        支付宝登录
                    </button>
                </div>
            </div>

            <div class="absolute bottom-6 text-center text-xs text-slate-400">
                登录即代表您同意
                <a href="#" class="text-slate-600 hover:text-slate-900 underline">服务条款</a> 和
                <a href="#" class="text-slate-600 hover:text-slate-900 underline">隐私政策</a>
            </div>
        </div>
    </div>

</body>
</html>
